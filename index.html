提示されたコードには、主に**「変数の重複宣言」「関数のスコープ（定義場所）」「CSSのクラス管理」**の3点に大きな問題があり、それらが原因で正常に動作しなくなっています。

特に、後半の`<script type="module">`内で同じ変数名（`progress`など）を再宣言しているため、エラーが発生したり、データが保存されなかったりしています。

以下に、これらを統合・整理した修正版の全コードを提示します。

### 修正のポイント
1.  **モジュール化の整理**: `addUser`や`login`などを`window`オブジェクトに紐付け、HTMLの`onclick`から呼べるようにしました。
2.  **変数の統一**: `progress` データの保存先を `progress_ユーザー名` に統一し、ログアウト時にデータが混ざらないようにしました。
3.  **表示制御の修正**: `hidden` クラスと `active` クラスが混在していたため、`hidden`（`display: none`）に統一しました。
4.  **タイポの修正**: 一部関数名や変数名の不一致を修正しました。

```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英単語クイズ</title>
<style>
/* 基本レイアウト */
* { box-sizing: border-box; }
body { margin: 0; font-family: Arial, sans-serif; padding: 8px; background: #f0f2f5; }

/* ページ切り替え */
.page { display: none; padding-top: 10px; }
.page.active { display: block; }
.hidden { display: none !important; }

/* クイズ画面 */
#quiz { flex-direction: column; height: 90vh; }
#quizContent { text-align: center; margin-bottom: 10px; }
#meaning { font-size: 24px; font-weight: bold; margin: 15px 0; }
#exampleArea { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; min-height: 60px; }

/* 判定表示 */
#resultArea { min-height: 100px; text-align: center; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
#resultArea.correct { background: #eef8f1; }
#resultArea.wrong { background: #fdf1f1; }
#judge { font-size: 32px; font-weight: bold; }
#correctWord { font-size: 18px; margin: 5px 0; }

/* 入力・ボタン */
#answerInput { width: 90%; font-size: 20px; text-align: center; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
#actionButtons { display: flex; gap: 8px; justify-content: center; }
button { padding: 10px 15px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; }
button:active { background: #ddd; }

/* キーボード */
#keyboard { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
.key-row { display: flex; justify-content: center; gap: 4px; }
.key-row button { min-width: 35px; height: 40px; padding: 0; }

/* 一覧テーブル */
#wordTable { width: 100%; border-collapse: collapse; background: white; }
#wordTable th, #wordTable td { border: 1px solid #ccc; padding: 8px; font-size: 14px; }

/* ナビゲーション */
#quizControls { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="quizControls">
  <button onclick="goToQuiz()">問題</button>
  <button onclick="showPage('list')">一覧</button>
  <button onclick="enableWrongOnlyMode()">不正解のみ</button>
  <button onclick="resetProgress()">リセット</button>
  <button onclick="logout()">ログアウト</button>
</div>

<section id="userPage" class="page">
  <h3>生徒追加</h3>
  <input id="newName" placeholder="名前">
  <input id="newPass" type="password" placeholder="パスワード">
  <button onclick="addUser()">追加</button>
  <hr>
  <h3>ログイン</h3>
  <div id="userList"></div>
  <div id="loginArea" class="hidden">
    <p><span id="selectedUserName"></span> でログイン</p>
    <input id="passwordInput" type="password" placeholder="パスワードを入力">
    <button onclick="login()">ログイン</button>
  </div>
</section>

<section id="quiz" class="page">
  <div id="progressMini"></div>
  <div id="quizContent">
    <div id="meaning"></div>
    <div id="exampleArea">
      <div id="exampleEn"></div>
      <div id="exampleJa"></div>
    </div>
  </div>

  <div id="resultArea">
    <div id="judge"></div>
    <div id="correctWord"></div>
    <div id="answerExample"></div>
  </div>

  <div id="answerControlArea">
    <input id="answerInput" type="text" readonly>
    <div id="actionButtons">
      <button id="checkBtn">回答</button>
      <button id="nextBtn" class="hidden">次へ</button>
      <button id="toggleBtn" class="hidden">正誤切替</button>
    </div>
  </div>

  <div id="quizKeyboard">
    <div id="keyboard"></div>
    <select id="keyboardSelect" style="margin-top:10px;">
      <option value="mobile">アルファベット配列</option>
      <option value="qwerty">QWERTY</option>
    </select>
  </div>
</section>

<section id="list" class="page">
  <select id="filter" onchange="renderList()">
    <option value="all">全て</option>
    <option value="correct">正解</option>
    <option value="wrong">不正解</option>
    <option value="unanswered">未出題</option>
  </select>
  <table id="wordTable"></table>
</section>

<script type="module">
/* 1. 基本データと初期化 */
const words = [
  { word: "act", meaning: "行動する", example: "We must _____ now.", exampleJa: "私たちは今すぐ行動しなければならない。" },
  { word: "weather", meaning: "天気", example: "The ____ is nice today.", exampleJa: "今日は天気がいいです。" },
];

let progress = {};
let current = null;
let lastJudge = null;
let wrongOnlyMode = false;
let currentLayout = localStorage.getItem("keyboardLayout") || "mobile";
let currentUser = localStorage.getItem("currentUser");
let selectedUser = null;
let upper = false;

/* 2. ページ管理 */
window.showPage = function(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  const target = document.getElementById(id);
  if(target) target.classList.add("active");
  if(id === 'list') renderList();
};

/* 3. ユーザー管理 */
window.addUser = function() {
  const name = document.getElementById("newName").value;
  const pass = document.getElementById("newPass").value;
  if(!name || !pass) return alert("名前とパスを入力してください");
  let users = JSON.parse(localStorage.getItem("users") || "{}");
  users[name] = pass;
  localStorage.setItem("users", JSON.stringify(users));
  renderUserList();
};

function renderUserList() {
  const container = document.getElementById("userList");
  container.innerHTML = "";
  let users = JSON.parse(localStorage.getItem("users") || "{}");
  Object.keys(users).forEach(name => {
    const btn = document.createElement("button");
    btn.textContent = name;
    btn.style.margin = "4px";
    btn.onclick = () => {
      selectedUser = name;
      document.getElementById("selectedUserName").textContent = name;
      document.getElementById("loginArea").classList.remove("hidden");
    };
    container.appendChild(btn);
  });
}

window.login = function() {
  const pass = document.getElementById("passwordInput").value;
  let users = JSON.parse(localStorage.getItem("users") || "{}");
  if(users[selectedUser] === pass) {
    currentUser = selectedUser;
    localStorage.setItem("currentUser", currentUser);
    document.getElementById("passwordInput").value = "";
    loadUserData();
    showPage("quiz");
  } else {
    alert("パスワードが違います");
  }
};

window.logout = function() {
  localStorage.removeItem("currentUser");
  currentUser = null;
  progress = {};
  showPage("userPage");
};

/* 4. クイズロジック */
function loadUserData() {
  if(!currentUser) return;
  progress = JSON.parse(localStorage.getItem("progress_" + currentUser) || "{}");
  updateProgressMini();
  renderQuestion();
}

function getNextWord() {
  const list = words.filter(w => {
    const s = progress[w.word.toLowerCase()];
    if (wrongOnlyMode) return s === "wrong";
    return s !== "correct";
  });
  return list.length ? list[Math.floor(Math.random() * list.length)] : null;
}

function renderQuestion() {
  current = getNextWord();
  lastJudge = null;
  const input = document.getElementById("answerInput");
  const resultArea = document.getElementById("resultArea");

  if (!current) {
    document.getElementById("meaning").textContent = "学習完了！";
    return;
  }

  document.getElementById("meaning").textContent = current.meaning;
  document.getElementById("judge").textContent = "";
  document.getElementById("correctWord").textContent = "";
  document.getElementById("answerExample").textContent = "";
  document.getElementById("exampleEn").textContent = current.example || "";
  document.getElementById("exampleJa").textContent = current.exampleJa || "";
  
  input.value = "";
  resultArea.className = "";
  document.getElementById("checkBtn").disabled = false;
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("toggleBtn").classList.add("hidden");
}

document.getElementById("checkBtn").onclick = () => {
  const inputVal = document.getElementById("answerInput").value.trim().toLowerCase();
  const ok = inputVal === current.word.toLowerCase();
  lastJudge = ok ? "correct" : "wrong";

  const resultArea = document.getElementById("resultArea");
  const judgeText = document.getElementById("judge");
  
  judgeText.textContent = ok ? "◎" : "✕";
  resultArea.className = ok ? "correct" : "wrong";
  
  document.getElementById("correctWord").textContent = "答え: " + current.word;
  if (current.example) {
    document.getElementById("answerExample").textContent = current.example.replace(/_+/g, current.word);
  }

  document.getElementById("checkBtn").disabled = true;
  document.getElementById("nextBtn").classList.remove("hidden");
  document.getElementById("toggleBtn").classList.remove("hidden");
};

document.getElementById("toggleBtn").onclick = () => {
  lastJudge = (lastJudge === "correct") ? "wrong" : "correct";
  document.getElementById("judge").textContent = (lastJudge === "correct") ? "◎" : "✕";
  document.getElementById("resultArea").className = lastJudge;
};

document.getElementById("nextBtn").onclick = () => {
  progress[current.word.toLowerCase()] = lastJudge;
  localStorage.setItem("progress_" + currentUser, JSON.stringify(progress));
  updateProgressMini();
  renderQuestion();
};

window.goToQuiz = () => {
  wrongOnlyMode = false;
  showPage("quiz");
  loadUserData();
};

window.enableWrongOnlyMode = () => {
  wrongOnlyMode = true;
  showPage("quiz");
  renderQuestion();
};

window.resetProgress = () => {
  if (!confirm("現在のユーザーの進捗をリセットしますか？")) return;
  progress = {};
  localStorage.removeItem("progress_" + currentUser);
  renderQuestion();
};

function updateProgressMini() {
  const count = Object.keys(progress).filter(k => progress[k] === "correct").length;
  document.getElementById("progressMini").textContent = `完了: ${count} / ${words.length}`;
}

/* 5. 一覧表示 */
window.renderList = function() {
  const table = document.getElementById("wordTable");
  const filter = document.getElementById("filter").value;
  table.innerHTML = "<tr><th>単語</th><th>意味</th><th>状態</th></tr>";

  words.forEach(w => {
    const state = progress[w.word.toLowerCase()];
    if (filter === "correct" && state !== "correct") return;
    if (filter === "wrong" && state !== "wrong") return;
    if (filter === "unanswered" && state !== undefined) return;

    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${w.word}</td><td>${w.meaning}</td><td style="cursor:pointer">${state === "correct" ? "〇" : state === "wrong" ? "×" : "-"}</td>`;
    
    tr.lastChild.onclick = () => {
      const key = w.word.toLowerCase();
      if (!progress[key]) progress[key] = "correct";
      else if (progress[key] === "correct") progress[key] = "wrong";
      else delete progress[key];
      localStorage.setItem("progress_" + currentUser, JSON.stringify(progress));
      renderList();
    };
    table.appendChild(tr);
  });
};

/* 6. キーボード */
const layouts = {
  mobile: [["a","b","c","d","e","f","g","h","i"],["j","k","l","m","n","o","p","q","r"],["shift","s","t","u","v","w","x","y","z","del"]],
  qwerty: [["q","w","e","r","t","y","u","i","o","p"],["a","s","d","f","g","h","j","k","l"],["shift","z","x","c","v","b","n","m","del"]]
};

function buildKeyboard() {
  const container = document.getElementById("keyboard");
  container.innerHTML = "";
  layouts[currentLayout].forEach(row => {
    const div = document.createElement("div");
    div.className = "key-row";
    row.forEach(key => {
      const btn = document.createElement("button");
      if (key === "shift") {
        btn.textContent = "↑";
        btn.onclick = () => { upper = !upper; buildKeyboard(); };
      } else if (key === "del") {
        btn.textContent = "⌫";
        btn.onclick = () => { 
          const input = document.getElementById("answerInput");
          input.value = input.value.slice(0, -1);
        };
      } else {
        const char = upper ? key.toUpperCase() : key;
        btn.textContent = char;
        btn.onclick = () => {
          document.getElementById("answerInput").value += char;
          if(upper) { upper = false; buildKeyboard(); }
        };
      }
      div.appendChild(btn);
    });
    container.appendChild(div);
  });
}

document.getElementById("keyboardSelect").onchange = (e) => {
  currentLayout = e.target.value;
  localStorage.setItem("keyboardLayout", currentLayout);
  buildKeyboard();
};

/* 初期起動 */
function init() {
  renderUserList();
  if (currentUser) {
    loadUserData();
    showPage("quiz");
  } else {
    showPage("userPage");
  }
  buildKeyboard();
}

init();
</script>
</body>
</html>
```
