<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; padding:8px; }
.hidden { display:none; }

.page {
  position:absolute;
  top:40px;
  left:0;
  width:100%;
  height:calc(100dvh - 40px);
  background:#fff;
}

#quizControls {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#eee;
  padding:4px;
  z-index:10;
}

button { padding:6px; margin:2px; }

.correct { color:green; }
.wrong { color:red; }
</style>
</head>

<body>

<!-- 上ボタン -->
<div id="quizControls">
  <button onclick="showPage('quiz')">問題</button>
  <button onclick="showPage('list')">一覧</button>
  <button onclick="enableWrongOnly()">不正解のみ</button>
  <button onclick="resetProgress()">リセット</button>
</div>

<main>

<!-- ログイン -->
<section id="userPage" class="page">
  <h3>生徒追加</h3>
  <input id="newName" placeholder="名前">
  <input id="newPass" type="password" placeholder="パスワード">
  <button onclick="addUser()">追加</button>

  <h3>ログイン</h3>
  <div id="userList"></div>

  <div id="loginArea" class="hidden">
    <input id="passwordInput" type="password">
    <button onclick="login()">ログイン</button>
  </div>
</section>

<!-- クイズ -->
<section id="quiz" class="page hidden">
  <div id="meaning"></div>
  <input id="answerInput">

  <div id="judge"></div>
  <div id="correctWord"></div>

  <button id="checkBtn">回答</button>
  <button id="nextBtn">次へ</button>
</section>

<!-- 一覧 -->
<section id="list" class="page hidden">
  <table id="wordTable"></table>
</section>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== 単語 ===== */
const words = [
  { word:"apple", meaning:"りんご" },
  { word:"book", meaning:"本" },
  { word:"cat", meaning:"猫" }
];

/* ===== 状態 ===== */
let users = JSON.parse(localStorage.getItem("users") || "{}");
let currentUser = localStorage.getItem("currentUser");
let selectedUser = null;

let progress = {};
let current = null;
let lastJudge = null;

let wrongOnly = false;

/* ===== UI ===== */
const meaning = document.getElementById("meaning");
const input = document.getElementById("answerInput");
const judge = document.getElementById("judge");
const correctWord = document.getElementById("correctWord");

/* =========================
   ユーザー
========================= */
window.addUser = function () {
  const name = document.getElementById("newName").value;
  const pass = document.getElementById("newPass").value;

  if (!name || !pass) return;

  users[name] = pass;
  localStorage.setItem("users", JSON.stringify(users));
  renderUsers();
};

function renderUsers() {
  const list = document.getElementById("userList");
  list.innerHTML = "";

  Object.keys(users).forEach(name => {
    const btn = document.createElement("button");
    btn.textContent = name;
    btn.onclick = () => {
      selectedUser = name;
      document.getElementById("loginArea").classList.remove("hidden");
    };
    list.appendChild(btn);
  });
}

/* =========================
   ログイン
========================= */
window.login = function () {
  const pass = document.getElementById("passwordInput").value;

  if (users[selectedUser] === pass) {
    currentUser = selectedUser;
    localStorage.setItem("currentUser", currentUser);

    loadProgress();
    showPage("quiz");
  } else {
    alert("パスワード違う");
  }
};

/* =========================
   進捗
========================= */
function loadProgress() {
  progress = JSON.parse(
    localStorage.getItem("progress_" + currentUser) || "{}"
  );

  renderQuestion();
}

function saveProgress() {
  localStorage.setItem(
    "progress_" + currentUser,
    JSON.stringify(progress)
  );
}

/* =========================
   問題
========================= */
function getNext() {
  const list = words.filter(w => {
    const s = progress[w.word];

    if (wrongOnly) return s === "wrong";
    return s !== "correct";
  });

  return list[Math.floor(Math.random() * list.length)];
}

function renderQuestion() {
  current = getNext();

  if (!current) {
    meaning.textContent = "完了";
    return;
  }

  meaning.textContent = current.meaning;
  input.value = "";
  judge.textContent = "";
  correctWord.textContent = "";
}

/* =========================
   回答
========================= */
document.getElementById("checkBtn").onclick = () => {
  const ok = input.value === current.word;

  lastJudge = ok;

  judge.textContent = ok ? "◎" : "✕";
  correctWord.textContent = current.word;
};

document.getElementById("nextBtn").onclick = async () => {
  if (!current) return;

  progress[current.word] = lastJudge ? "correct" : "wrong";
  saveProgress();

  await addDoc(collection(db, "logs"), {
    user: currentUser,
    word: current.word,
    correct: lastJudge,
    time: Date.now()
  });

  renderQuestion();
};

/* =========================
   ページ
========================= */
window.showPage = function (id) {
  document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
};

window.enableWrongOnly = function () {
  wrongOnly = true;
  renderQuestion();
};

window.resetProgress = function () {
  progress = {};
  localStorage.removeItem("progress_" + currentUser);
  renderQuestion();
};

/* =========================
   初期化
========================= */
function init() {
  renderUsers();

  if (currentUser) {
    loadProgress();
    showPage("quiz");
  } else {
    showPage("userPage");
  }
}

init();
</script>

</body>
</html>
