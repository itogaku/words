<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英単語クイズ Pro</title>
<style>
/* 基本レイアウト */
* { box-sizing: border-box; }
body { margin: 0; font-family: Arial, sans-serif; padding: 8px; background: #f0f2f5; }

/* ページ切り替え */
.page { display: none; padding-top: 10px; }
.page.active { display: block; }
.hidden { display: none !important; }

/* ナビゲーション（初期状態は非表示） */
#quizControls { display: none; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
#quizControls.is-logged-in { display: flex !important; }

/* クイズ画面 */
#quiz { flex-direction: column; height: 90vh; }
#quizContent { text-align: center; margin-bottom: 10px; }
#meaning { font-size: 24px; font-weight: bold; margin: 15px 0; }
#exampleArea { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; min-height: 60px; }

/* 判定表示 */
#resultArea { min-height: 100px; text-align: center; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
#resultArea.correct { background: #eef8f1; }
#resultArea.wrong { background: #fdf1f1; }
#judge { font-size: 32px; font-weight: bold; }
#correctWord { font-size: 18px; margin: 5px 0; }

/* 入力・ボタン */
#answerInput { width: 90%; font-size: 20px; text-align: center; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
#actionButtons { display: flex; gap: 8px; justify-content: center; }
button { padding: 10px 15px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; }
button:active { background: #ddd; }
.btn-delete { color: #c62828; border-color: #ffcdd2; font-size: 12px; padding: 4px 8px; margin-left: 10px; }

/* ユーザーリスト */
.user-item { display: flex; align-items: center; justify-content: space-between; background: white; margin-bottom: 5px; padding: 5px 10px; border-radius: 4px; }

/* キーボード */
#keyboard { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
.key-row { display: flex; justify-content: center; gap: 4px; }
.key-row button { min-width: 35px; height: 40px; padding: 0; }

/* 一覧テーブル */
#wordTable { width: 100%; border-collapse: collapse; background: white; }
#wordTable th, #wordTable td { border: 1px solid #ccc; padding: 8px; font-size: 14px; }

.is-logged-in { display: flex !important; }

#sectionContainer button {
  border: 2px solid #2196f3;
  border-radius: 8px;
  color: #2196f3;
  font-weight: bold;
  transition: 0.2s;
}

#sectionContainer button:active {
  background: #2196f3;
  color: white;
}

.page { display: none; }
.page.active { display: block !important; }
#quiz.active { display: flex !important; } /* クイズ画面がflexの場合 */
</style>
</head>
<body>

<div id="quizControls">
  <button onclick="showPage('sectionPage')">セクション選択</button>
  <button onclick="showPage('list')">一覧</button>
  <button onclick="logout()">ログアウト</button>
</div>

<section id="sectionPage" class="page">
  <h2 style="text-align:center;">学習セクションを選択</h2>
  <div id="sectionContainer" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:10px;">
    </div>
  <div style="padding:10px; border-top:1px solid #ccc; margin-top:20px;">
    <button onclick="changeSection(0)" style="width:100%; height:50px; background:#f0f0f0;">全範囲から出題</button>
  </div>
</section>

<section id="userPage" class="page">
  <div style="background:#fff; padding:15px; border-radius:8px; margin-bottom:20px;">
    <h3>生徒追加</h3>
    <input id="newName" placeholder="名前">
    <input id="newPass" type="password" placeholder="パスワード">
    <button onclick="addUser()">追加</button>
  </div>
  
  <h3>生徒一覧（ログインする人を選んでね）</h3>
  <div id="userList"></div>
  
  <div id="loginArea" class="hidden" style="margin-top:20px; padding:15px; background:#e3f2fd; border-radius:8px;">
    <p><strong id="selectedUserName"></strong> でログイン</p>
    <input id="passwordInput" type="password" placeholder="パスワードを入力">
    <button onclick="login()" style="background:#2196f3; color:white; border:none;">ログイン</button>
  </div>
</section>

<section id="quiz" class="page">
  <div id="progressMini" style="font-size:14px; color:#666;"></div>
  <div id="quizContent">
    <div id="meaning"></div>
    <div id="exampleArea">
      <div id="exampleEn"></div>
      <div id="exampleJa"></div>
    </div>
  </div>

  <div id="resultArea">
    <div id="judge"></div>
    <div id="correctWord"></div>
    <div id="answerExample"></div>
  </div>

  <div id="answerControlArea">
    <input id="answerInput" type="text" readonly>
    <div id="actionButtons">
      <button id="checkBtn">回答</button>
      <button id="nextBtn" class="hidden">次へ</button>
      <button id="toggleBtn" class="hidden">正誤切替</button>
    </div>
  </div>

  <div id="quizKeyboard">
    <div id="keyboard"></div>
    <select id="keyboardSelect" style="margin-top:15px;">
      <option value="mobile">アルファベット配列</option>
      <option value="qwerty">QWERTY</option>
    </select>
  </div>
</section>

<section id="list" class="page">
  <div style="margin-bottom: 10px; display: flex; gap: 10px;">
    <select id="filter" onchange="renderList()">
      <option value="all">全て表示</option>
      <option value="correct">正解のみ</option>
      <option value="wrong">不正解のみ</option>
      <option value="unanswered">未出題のみ</option>
    </select>

    <select id="listSectionSelect" onchange="changeListSection(this.value)">
      <option value="0">全単語を表示</option>
      </select>
  </div>

  <table id="wordTable"></table>
</section>

const SECTION_SIZE = 20; // 1セクションあたりの単語数
let currentSection = 0;   // 0なら全範囲、1なら1〜20番...

// セクション画面を表示するたびにボタンを更新
function renderSectionButtons() {
  const container = document.getElementById("sectionContainer");
  if (!container) return; // 要素がない場合は中断
  
  container.innerHTML = ""; // 一旦中身を空にする
  
  const sectionCount = Math.ceil(words.length / SECTION_SIZE);

  for (let i = 1; i <= sectionCount; i++) {
    const btn = document.createElement("button");
    btn.className = "section-btn"; // スタイル用
    btn.style.height = "70px";
    btn.style.fontSize = "16px";
    btn.style.cursor = "pointer";
    btn.innerHTML = `<strong>Section ${i}</strong><br><small>${(i-1)*SECTION_SIZE + 1}～${Math.min(i*SECTION_SIZE, words.length)}</small>`;
    
    btn.onclick = () => {
      changeSection(i);
    };
    container.appendChild(btn);
  }
}

window.changeSection = function(val) {
  currentSection = parseInt(val);
  wrongOnlyMode = false; // セクションを選び直した時は通常モードに
  renderQuestion();
  showPage("quiz"); // セクションを選んだらクイズ画面へ
};

let current = null;
let lastJudge = null;
let wrongOnlyMode = false;

/* 画面表示制御 */
/* ===== ページ切り替え関数（統合版） ===== */
window.showPage = function(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  const target = document.getElementById(id);
  if(target) target.classList.add("active");

  const controls = document.getElementById("quizControls");
  if (currentUser) {
    controls.style.display = "flex";
    controls.classList.add("is-logged-in");
  } else {
    controls.style.display = "none";
    controls.classList.remove("is-logged-in");
  }

  // 画面移動時に必要な描画を自動実行
  if (id === "list") renderList();
  if (id === "sectionPage") renderSectionButtons();
};
/* ユーザー管理 */
window.addUser = function() {
  const name = document.getElementById("newName").value.trim();
  const pass = document.getElementById("newPass").value.trim();
  if(!name || !pass) return alert("名前とパスを入力してください");
  
  let users = JSON.parse(localStorage.getItem("users") || "{}");
  if(users[name]) return alert("その名前は既に使われています");
  
  users[name] = pass;
  localStorage.setItem("users", JSON.stringify(users));
  document.getElementById("newName").value = "";
  document.getElementById("newPass").value = "";
  renderUserList();
};

window.changeListSection = function(val) {
  currentSection = parseInt(val);
  renderList();
};
  
window.deleteUser = function(name) {
  if(!confirm(`「${name}」のアカウントと進捗データをすべて消去しますか？`)) return;
  
  // ユーザーリストから削除
  let users = JSON.parse(localStorage.getItem("users") || "{}");
  delete users[name];
  localStorage.setItem("users", JSON.stringify(users));
  
  // 進捗データも削除
  localStorage.removeItem("progress_" + name);
  
  // 選択中のユーザーだったらリセット
  if(selectedUser === name) {
    selectedUser = null;
    document.getElementById("loginArea").classList.add("hidden");
  }
  
  renderUserList();
};

function renderUserList() {
  const container = document.getElementById("userList");
  container.innerHTML = "";
  let users = JSON.parse(localStorage.getItem("users") || "{}");
  
  Object.keys(users).forEach(name => {
    const div = document.createElement("div");
    div.className = "user-item";
    
    const nameBtn = document.createElement("button");
    nameBtn.textContent = name;
    nameBtn.style.flex = "1";
    nameBtn.style.textAlign = "left";
    nameBtn.onclick = () => {
      selectedUser = name;
      document.getElementById("selectedUserName").textContent = name;
      document.getElementById("loginArea").classList.remove("hidden");
    };
    
    const delBtn = document.createElement("button");
    delBtn.textContent = "削除";
    delBtn.className = "btn-delete";
    delBtn.onclick = (e) => {
      e.stopPropagation(); // ログイン選択イベントを防ぐ
      deleteUser(name);
    };
    
    div.appendChild(nameBtn);
    div.appendChild(delBtn);
    container.appendChild(div);
  });
}

window.login = function() {
  const pass = document.getElementById("passwordInput").value;
  let users = JSON.parse(localStorage.getItem("users") || "{}");
  
  if(users[selectedUser] === pass) {
    currentUser = selectedUser;
    localStorage.setItem("currentUser", currentUser);
    document.getElementById("passwordInput").value = "";
    
    loadUserData(); // 進捗読み込み
    renderSectionButtons(); // ★ここでボタンを作成！
    showPage("sectionPage"); // 画面移動
  } else {
    alert("パスワードが違います");
  }
};

/* クイズロジック */
function loadUserData() {
  if(!currentUser) return;
  progress = JSON.parse(localStorage.getItem("progress_" + currentUser) || "{}");
  updateProgressMini();
  renderQuestion();
}

function getNextWord() {
  const list = words.filter(w => {
    const s = progress[w.word.toLowerCase()];
    if (wrongOnlyMode) return s === "wrong";
    return s !== "correct";
  });
  return list.length ? list[Math.floor(Math.random() * list.length)] : null;
}

function renderQuestion() {
  current = getNextWord();
  lastJudge = null;
  const input = document.getElementById("answerInput");
  const resultArea = document.getElementById("resultArea");

  if (!current) {
    document.getElementById("meaning").textContent = "学習完了！";
    document.getElementById("exampleEn").textContent = "";
    document.getElementById("exampleJa").textContent = "";
    return;
  }

  document.getElementById("meaning").textContent = current.meaning;
  document.getElementById("judge").textContent = "";
  document.getElementById("correctWord").textContent = "";
  document.getElementById("answerExample").textContent = "";
  document.getElementById("exampleEn").textContent = current.example || "";
  document.getElementById("exampleJa").textContent = current.exampleJa || "";
  
  input.value = "";
  resultArea.className = "";
  document.getElementById("checkBtn").disabled = false;
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("toggleBtn").classList.add("hidden");
}

document.getElementById("checkBtn").onclick = () => {
  const inputVal = document.getElementById("answerInput").value.trim().toLowerCase();
  const ok = inputVal === current.word.toLowerCase();
  lastJudge = ok ? "correct" : "wrong";

  const resultArea = document.getElementById("resultArea");
  document.getElementById("judge").textContent = ok ? "◎" : "✕";
  resultArea.className = ok ? "correct" : "wrong";
  document.getElementById("correctWord").textContent = "答え: " + current.word;
  if (current.example) {
    document.getElementById("answerExample").textContent = current.example.replace(/_+/g, current.word);
  }

  document.getElementById("checkBtn").disabled = true;
  document.getElementById("nextBtn").classList.remove("hidden");
  document.getElementById("toggleBtn").classList.remove("hidden");
};

document.getElementById("toggleBtn").onclick = () => {
  lastJudge = (lastJudge === "correct") ? "wrong" : "correct";
  document.getElementById("judge").textContent = (lastJudge === "correct") ? "◎" : "✕";
  document.getElementById("resultArea").className = lastJudge;
};

document.getElementById("nextBtn").onclick = () => {
  progress[current.word.toLowerCase()] = lastJudge;
  localStorage.setItem("progress_" + currentUser, JSON.stringify(progress));
  updateProgressMini();
  renderQuestion();
};

window.goToQuiz = () => {
  wrongOnlyMode = false;
  showPage("quiz");
  loadUserData();
};

window.enableWrongOnlyMode = () => {
  wrongOnlyMode = true;
  showPage("quiz");
  renderQuestion();
};

window.resetProgress = () => {
  if (!confirm("進捗データをリセットしますか？")) return;
  progress = {};
  localStorage.removeItem("progress_" + currentUser);
  renderQuestion();
  updateProgressMini();
};

function updateProgressMini() {
  const count = Object.keys(progress).filter(k => progress[k] === "correct").length;
  document.getElementById("progressMini").textContent = `完了: ${count} / ${words.length}`;
}

/* 一覧表示 */
/* ===== 一覧表示（セクション・フィルター対応版） ===== */
window.renderList = function() {
  const table = document.getElementById("wordTable");
  const filter = document.getElementById("filter").value;
  
  // テーブルのヘッダーを作成
  table.innerHTML = "<tr><th>No</th><th>単語</th><th>意味</th><th>状態</th></tr>";

  // 1. 表示する単語の範囲を決定（セクション分け）
  let displayWords = words;
  let offset = 0; // 番号表示用のズレ
  
  if (currentSection > 0) {
    offset = (currentSection - 1) * SECTION_SIZE;
    displayWords = words.slice(offset, offset + SECTION_SIZE);
  }

  // 2. 絞り込んだ単語をループで回して行を作成
  displayWords.forEach((w, index) => {
    const key = w.word.toLowerCase();
    const state = progress[key]; // "correct" | "wrong" | undefined

    /* --- フィルター判定（正解・不正解・未回答の絞り込み） --- */
    if (filter === "correct" && state !== "correct") return;
    if (filter === "wrong" && state !== "wrong") return;
    if (filter === "unanswered" && state !== undefined) return;

    const tr = document.createElement("tr");

    // 通し番号（No）
    const tdNo = document.createElement("td");
    tdNo.textContent = offset + index + 1;
    tdNo.style.color = "#888";
    tdNo.style.fontSize = "12px";

    // 単語
    const tdWord = document.createElement("td");
    tdWord.textContent = w.word;

    // 意味（例文がある場合は含める）
    const tdMeaning = document.createElement("td");
    const meaningDiv = document.createElement("div");
    meaningDiv.textContent = w.meaning;
    tdMeaning.appendChild(meaningDiv);
    
    if (w.example) {
      const exDiv = document.createElement("div");
      exDiv.textContent = w.example.replace(/_+/g, w.word);
      exDiv.style.fontSize = "11px";
      exDiv.style.color = "#666";
      tdMeaning.appendChild(exDiv);
    }

    // 状態（〇/×/-）クリックで変更可能
    const tdStatus = document.createElement("td");
    tdStatus.style.textAlign = "center";
    tdStatus.style.cursor = "pointer";
    tdStatus.textContent = 
      state === "correct" ? "〇" : 
      state === "wrong"   ? "×" : "-";

    // クリックで状態をループさせる
    tdStatus.onclick = () => {
      if (!progress[key]) {
        progress[key] = "correct";
      } else if (progress[key] === "correct") {
        progress[key] = "wrong";
      } else {
        delete progress[key];
      }
      localStorage.setItem("progress_" + currentUser, JSON.stringify(progress));
      renderList(); // 再描画
    };

    tr.appendChild(tdNo);
    tr.appendChild(tdWord);
    tr.appendChild(tdMeaning);
    tr.appendChild(tdStatus);
    table.appendChild(tr);
  });
};

/* キーボード */
const layouts = {
  mobile: [["a","b","c","d","e","f","g","h","i"],["j","k","l","m","n","o","p","q","r"],["shift","s","t","u","v","w","x","y","z","del"]],
  qwerty: [["q","w","e","r","t","y","u","i","o","p"],["a","s","d","f","g","h","j","k","l"],["shift","z","x","c","v","b","n","m","del"]]
};

function buildKeyboard() {
  const container = document.getElementById("keyboard");
  container.innerHTML = "";
  layouts[currentLayout].forEach(row => {
    const div = document.createElement("div");
    div.className = "key-row";
    row.forEach(key => {
      const btn = document.createElement("button");
      if (key === "shift") {
        btn.textContent = "↑";
        btn.onclick = () => { upper = !upper; buildKeyboard(); };
      } else if (key === "del") {
        btn.textContent = "⌫";
        btn.onclick = () => { 
          const input = document.getElementById("answerInput");
          input.value = input.value.slice(0, -1);
        };
      } else {
        const char = upper ? key.toUpperCase() : key;
        btn.textContent = char;
        btn.onclick = () => {
          document.getElementById("answerInput").value += char;
          if(upper) { upper = false; buildKeyboard(); }
        };
      }
      div.appendChild(btn);
    });
    container.appendChild(div);
  });
}

document.getElementById("keyboardSelect").onchange = (e) => {
  currentLayout = e.target.value;
  localStorage.setItem("keyboardLayout", currentLayout);
  buildKeyboard();
};

/* 初期起動 */
function init() {
  renderUserList();
  if (currentUser) {
    loadUserData();
    showPage("quiz");
  } else {
    showPage("userPage");
  }
  buildKeyboard();
}

init();
</script>
